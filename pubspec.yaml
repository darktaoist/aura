name: gwansang
description: "Aura — 관상·손금 AI 분석 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # On-device AI & Vision
  flutter_gemma: ^0.13.2
  google_mlkit_face_mesh_detection: ^0.4.2
  hand_landmarker: ^2.2.0
  camera: ^0.11.4
  image: ^4.8.0

  # Backend
  supabase_flutter: ^2.5.0
  dio: ^5.4.3
  crypto: ^3.0.0

  # Auth
  google_sign_in: ^6.2.1
  kakao_flutter_sdk_user: ^1.9.0

  # State / Navigation
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.0.0

  # UI / Utils
  flex_color_scheme: ^8.4.0
  google_fonts: ^6.2.0
  flutter_markdown: ^0.7.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  device_info_plus: ^10.1.0
  connectivity_plus: ^6.0.3
  uuid: ^4.4.0
  flutter_svg: ^2.0.10
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/prompts/
    - assets/legal/ko/
    - assets/legal/en/
    - assets/legal/ja/
    - assets/legal/zh/
