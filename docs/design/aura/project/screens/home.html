<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>Aura — Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined:opsz,wght,GRAD,FILL@24,400,0,0" rel="stylesheet"/>
<style>
:root{
  --surface:#FDFCFF; --surface-c:#F7F5FB; --surface-ch:#EFEBF4;
  --border:rgba(0,0,0,.08); --border-accent:rgba(107,92,231,.20);
  --shadow:0 2px 12px rgba(26,21,51,.06);
  --on:#1A1533; --on-muted:#5A5470; --on-subtle:#8E89A2;
  --seed:#6B5CE7; --grad-start:#6B5CE7; --grad-end:#4EA8DE;
  --sec-overall:#6B5CE7; --sec-eyes:#6B7BE8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--surface);color:var(--on);min-height:100vh;-webkit-font-smoothing:antialiased}
.app{padding:0 0 24px}
.top{display:flex;align-items:center;padding:12px 20px 8px;gap:4px}
.wordmark{font-weight:800;font-size:22px;letter-spacing:-.5px;background:linear-gradient(135deg,var(--grad-start),var(--grad-end));-webkit-background-clip:text;background-clip:text;color:transparent}
.top .sp{flex:1}
.icon-btn{width:44px;height:44px;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;background:transparent;border:0;color:var(--on)}
.icon-btn .mi{font-family:'Material Symbols Outlined';font-size:22px}
.hero{padding:8px 20px 32px}
.hero .overline{font-size:11px;letter-spacing:1.6px;font-weight:700;color:var(--on-subtle);text-transform:uppercase;margin-bottom:8px}
.hero h1{font-size:26px;font-weight:600;letter-spacing:-.4px;line-height:1.3}
.grid{padding:0 20px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{aspect-ratio:.82/1;position:relative;border:1px solid var(--border);border-radius:16px;background:var(--surface-c);overflow:hidden;box-shadow:var(--shadow)}
.card.c1{background:linear-gradient(135deg,rgba(107,92,231,.08),rgba(107,92,231,.02)),var(--surface-c)}
.card.c2{background:linear-gradient(135deg,rgba(107,123,232,.08),rgba(107,123,232,.02)),var(--surface-c)}
.card .bg-icon{position:absolute;right:-12px;bottom:-12px;font-family:'Material Symbols Outlined';font-size:128px;color:rgba(107,92,231,.14);line-height:1}
.card.c2 .bg-icon{color:rgba(107,123,232,.14)}
.card .body{position:relative;height:100%;padding:16px;display:flex;flex-direction:column}
.label{font-size:11px;letter-spacing:1.4px;font-weight:700;color:var(--sec-overall)}
.card.c2 .label{color:var(--sec-eyes)}
.badge{margin-left:auto;font-size:11px;letter-spacing:.6px;font-weight:600;color:var(--on-muted);background:var(--surface-ch);border:1px solid var(--border);border-radius:100px;padding:3px 8px}
.card .title{margin-top:auto;font-size:20px;font-weight:700;letter-spacing:-.2px;line-height:1.3}
.card .desc{margin-top:4px;font-size:12px;color:var(--on-muted);letter-spacing:.2px}
.section-head{display:flex;align-items:center;padding:32px 20px 8px}
.section-head h2{font-size:17px;font-weight:600}
.section-head .more{margin-left:auto;font-size:14px;color:var(--seed);font-weight:600;background:none;border:0;padding:8px 12px;border-radius:12px}
.resume{margin:0 20px;padding:16px;border:1px solid var(--border);border-radius:16px;background:var(--surface-c);box-shadow:var(--shadow);display:flex;align-items:center;gap:12px}
.avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--grad-start),var(--grad-end));display:inline-flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.avatar .mi{font-family:'Material Symbols Outlined';font-size:20px}
.resume .t{font-size:15px;font-weight:600;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.resume .p{font-size:12px;color:var(--on-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.resume .chev{font-family:'Material Symbols Outlined';color:var(--on-subtle);margin-left:auto}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="wordmark">aura</div>
    <div class="sp"></div>
    <button class="icon-btn"><span class="mi">history</span></button>
    <button class="icon-btn"><span class="mi">settings</span></button>
  </div>
  <div class="hero">
    <div class="overline">오늘의 아우라</div>
    <h1>당신의 기운은 차분하지만<br>안에 또렷한 중심이 있어요.</h1>
  </div>
  <div class="grid">
    <div class="card c1">
      <span class="bg-icon">face_retouching_natural</span>
      <div class="body">
        <div style="display:flex;align-items:center"><span class="label">AI 관상</span><span class="badge">게스트</span></div>
        <div class="title">얼굴을<br>읽다</div>
        <div class="desc">468 landmarks</div>
      </div>
    </div>
    <div class="card c2">
      <span class="bg-icon">back_hand</span>
      <div class="body">
        <div style="display:flex;align-items:center"><span class="label">AI 손금</span><span class="badge">게스트</span></div>
        <div class="title">손을<br>읽다</div>
        <div class="desc">21 landmarks</div>
      </div>
    </div>
  </div>
  <div class="section-head"><h2>이어가기</h2><button class="more">모두 보기</button></div>
  <div class="resume">
    <div class="avatar"><span class="mi">auto_awesome</span></div>
    <div style="min-width:0;flex:1">
      <div class="t">이마 부분에 대해 더 알려주세요</div>
      <div class="p">Aura · 당신의 집중력과 지혜의 흐름은…</div>
    </div>
    <span class="chev mi">chevron_right</span>
  </div>
</div>
</body>
</html>
