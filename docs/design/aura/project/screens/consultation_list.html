<!doctype html><html lang="ko"><head><meta charset="utf-8"/><title>Consultations</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet"/>
<style>
:root{--surface:#FDFCFF;--surface-c:#F7F5FB;--surface-ch:#EFEBF4;--border:rgba(0,0,0,.08);--on:#1A1533;--on-muted:#5A5470;--on-subtle:#8E89A2;--seed:#6B5CE7;--grad-start:#6B5CE7;--grad-end:#4EA8DE}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Noto Sans KR',sans-serif;background:var(--surface);color:var(--on)}
.appbar{display:flex;align-items:center;padding:10px 12px}
.mi{font-family:'Material Symbols Outlined';font-size:22px}
.icon-btn{width:44px;height:44px;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;background:transparent;border:0;color:var(--on)}
.h1{padding:8px 20px 20px;font-size:26px;font-weight:700;letter-spacing:-.4px}
.list{padding:0 20px;display:flex;flex-direction:column;gap:8px}
.item{padding:16px;border:1px solid var(--border);border-radius:16px;background:var(--surface-c);display:flex;gap:12px;align-items:flex-start}
.ava{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--grad-start),var(--grad-end));display:inline-flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.ava .mi{font-size:18px}
.main{flex:1;min-width:0}.top{display:flex;align-items:center}.t{font-size:15px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.date{font-size:11px;letter-spacing:.4px;color:var(--on-subtle);margin-left:8px}
.bot{display:flex;align-items:center;margin-top:4px}
.p{font-size:13px;color:var(--on-muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.unread{padding:2px 8px;font-size:11px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--grad-start),var(--grad-end));border-radius:100px;margin-left:8px}
.fab{position:fixed;right:20px;bottom:24px;width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--grad-start),var(--grad-end));display:inline-flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 8px 24px rgba(107,92,231,.35)}
</style></head><body>
<div class="appbar"><button class="icon-btn"><span class="mi">arrow_back</span></button></div>
<div class="h1">상담</div>
<div class="list">
<div class="item"><div class="ava"><span class="mi">auto_awesome</span></div><div class="main"><div class="top"><div class="t">이마 부분에 대해 더 알려주세요</div><div class="date">방금</div></div><div class="bot"><div class="p">Aura · 당신의 집중력과 지혜의 흐름은…</div><div class="unread">2</div></div></div></div>
<div class="item"><div class="ava"><span class="mi">auto_awesome</span></div><div class="main"><div class="top"><div class="t">중년기 운에 대한 조언</div><div class="date">4월 22일</div></div><div class="bot"><div class="p">당신의 얼굴에서 가장 두드러지는 특징은…</div></div></div></div>
<div class="item"><div class="ava"><span class="mi">auto_awesome</span></div><div class="main"><div class="top"><div class="t">왼손 운명선 해석</div><div class="date">4월 18일</div></div><div class="bot"><div class="p">손목에서 중지까지 뻗은 선은 주체성의 축…</div></div></div></div>
<div class="item"><div class="ava"><span class="mi">auto_awesome</span></div><div class="main"><div class="top"><div class="t">첫 리딩 요약</div><div class="date">4월 12일</div></div><div class="bot"><div class="p">전체적으로 차분한 기운에 분명한 중심이…</div></div></div></div>
</div>
<div class="fab"><span class="mi">add</span></div>
</body></html>
