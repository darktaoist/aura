<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>Aura — Auth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet"/>
<style>
:root{
  --surface:#FDFCFF; --surface-c:#F7F5FB; --surface-ch:#EFEBF4;
  --border:rgba(0,0,0,.08);
  --on:#1A1533; --on-muted:#5A5470; --on-subtle:#8E89A2;
  --seed:#6B5CE7; --grad-start:#6B5CE7; --grad-end:#4EA8DE;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--surface);color:var(--on);min-height:100vh;position:relative;display:flex;flex-direction:column;padding:40px 20px 32px;-webkit-font-smoothing:antialiased}
body::before{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 20%,rgba(107,92,231,.12),transparent 60%)}
.brand{text-align:center;margin-top:40px;position:relative}
.wordmark{font-weight:800;font-size:48px;letter-spacing:-1px;background:linear-gradient(135deg,var(--grad-start),var(--grad-end));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1}
.tagline{margin-top:16px;font-size:15px;color:var(--on-muted);font-weight:500}
.spacer{flex:1}
.consent{border:1px solid var(--border);border-radius:16px;background:var(--surface-c);padding:16px;position:relative}
.consent-row{display:flex;align-items:center;gap:12px;padding:2px 0}
.consent-row + .consent-row{margin-top:8px}
.cb{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--on-subtle);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.cb.on{background:var(--seed);border-color:var(--seed);color:#fff}
.cb .mi{font-family:'Material Symbols Outlined';font-size:16px}
.consent-row .lbl{flex:1;font-size:14px}
.consent-row .chev{font-family:'Material Symbols Outlined';color:var(--on-muted);font-size:18px}
.oauth{margin-top:24px;display:flex;flex-direction:column;gap:8px;position:relative}
.btn{height:52px;border-radius:12px;background:var(--surface-c);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:10px;font-size:15px;font-weight:600;color:var(--on)}
.btn .mi{font-family:'Material Symbols Outlined';font-size:20px;color:var(--on-muted)}
.gglyph{width:18px;height:18px;display:inline-block;position:relative}
.gglyph svg{width:100%;height:100%}
.guest{margin-top:24px;text-align:center;font-size:14px;color:var(--seed);font-weight:600;padding:12px;position:relative}
</style>
</head>
<body>
<div class="brand">
  <div class="wordmark">aura</div>
  <div class="tagline">얼굴과 손으로 읽는 AI 관상·손금</div>
</div>
<div class="spacer"></div>
<div class="consent">
  <div class="consent-row">
    <div class="cb on"><span class="mi">check</span></div>
    <div class="lbl">이용약관에 동의합니다</div>
    <span class="chev">chevron_right</span>
  </div>
  <div class="consent-row">
    <div class="cb"></div>
    <div class="lbl">개인정보 처리방침에 동의합니다</div>
    <span class="chev">chevron_right</span>
  </div>
</div>
<div class="oauth">
  <div class="btn">
    <span class="gglyph">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.4l6.7-6.7C35.5 2.1 30.1 0 24 0 14.6 0 6.5 5.4 2.6 13.2l7.9 6.1C12.3 13.6 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.2-.4-4.7H24v9.1h12.7c-.6 3-2.3 5.5-4.9 7.2l7.7 6c4.5-4.1 7-10.2 7-17.6z"/><path fill="#FBBC05" d="M10.5 28.7c-.5-1.5-.8-3.1-.8-4.7s.3-3.2.8-4.7l-7.9-6.1C.9 16.6 0 20.2 0 24s.9 7.4 2.6 10.8l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.7-6c-2.1 1.4-4.9 2.3-8.2 2.3-6.4 0-11.7-4.1-13.5-9.8l-7.9 6.1C6.5 42.6 14.6 48 24 48z"/></svg>
    </span>
    Google로 계속하기
  </div>
  <div class="btn"><span class="mi">apple</span>Apple로 계속하기</div>
</div>
<div class="guest">둘러보기 · 게스트로 시작</div>
</body>
</html>
