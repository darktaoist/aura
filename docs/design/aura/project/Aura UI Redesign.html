<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>Aura — Design Preview</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Noto Sans KR',sans-serif;background:#0F0E13;color:#EDEAF5}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { AndroidDevice } = window;

function Screen({ src, w = 412, h = 892 }) {
  return (
    <AndroidDevice width={w} height={h}>
      <iframe src={src} style={{ width: "100%", height: "100%", border: 0, background: "#FDFCFF", display: "block" }} />
    </AndroidDevice>
  );
}

function App() {
  return (
    <DesignCanvas title="Aura — UI Redesign Preview" subtitle="보라-블루 그라데이션 × 화이트 베이스 · Material3 + Aura 토큰">
      <DCSection id="screens" title="주요 화면 4종">
        <DCArtboard id="home" label="홈" width={460} height={960}><Screen src="screens/home.html" /></DCArtboard>
        <DCArtboard id="result" label="관상 결과" width={460} height={960}><Screen src="screens/result.html" /></DCArtboard>
        <DCArtboard id="chat" label="AI 상담" width={460} height={960}><Screen src="screens/chat.html" /></DCArtboard>
        <DCArtboard id="auth" label="로그인" width={460} height={960}><Screen src="screens/auth.html" /></DCArtboard>
      </DCSection>
      <DCSection id="more" title="추가 6개 화면">
        <DCArtboard id="palm" label="손금 결과" width={460} height={960}><Screen src="screens/palm_result.html" /></DCArtboard>
        <DCArtboard id="history" label="기록" width={460} height={960}><Screen src="screens/history.html" /></DCArtboard>
        <DCArtboard id="clist" label="상담 목록" width={460} height={960}><Screen src="screens/consultation_list.html" /></DCArtboard>
        <DCArtboard id="settings" label="설정" width={460} height={960}><Screen src="screens/settings.html" /></DCArtboard>
        <DCArtboard id="camera" label="카메라" width={460} height={960}><Screen src="screens/camera.html" /></DCArtboard>
        <DCArtboard id="setup" label="모델 설정" width={460} height={960}><Screen src="screens/model_setup.html" /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
